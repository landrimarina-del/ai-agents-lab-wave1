services:
  db:
    image: postgres:15-alpine
    container_name: rise-db
    environment:
      POSTGRES_DB: rise
      POSTGRES_USER: rise
      POSTGRES_PASSWORD: rise
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: rise-backend
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: rise
      DB_USER: rise
      DB_PASSWORD: rise
      JWT_SECRET: rise-dev-jwt-secret-please-change-in-prod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    container_name: rise-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
